name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish crate
    runs-on: ubuntu-latest
    environment: release
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tagged commit is on main
        shell: bash
        run: |
          tagged_commit="$(git rev-parse "${GITHUB_REF_NAME}^{commit}")"
          git merge-base --is-ancestor "${tagged_commit}" origin/main || {
            echo "Tag ${GITHUB_REF_NAME} does not point to a commit on main" >&2
            exit 1
          }

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Verify tag matches package version
        shell: bash
        run: |
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "chainz") | .version')"
          test "v${version}" = "${GITHUB_REF_NAME}" || {
            echo "Tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${version}" >&2
            exit 1
          }

      - name: Verify release candidate
        run: cargo test --locked --all-targets

      - name: Verify package contents
        run: cargo package --locked

      - name: Publish to crates.io
        run: cargo publish --locked

  github-release:
    name: Create GitHub release
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Create release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --verify-tag --generate-notes
